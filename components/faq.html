<section id="faq" class="py-24 border-t border-white/5 relative overflow-hidden bg-[#050505]">
    
    <style>
        .faq-item { transition: all 0.3s ease; }
        .faq-item.active {
            border-color: rgba(239, 68, 68, 0.5) !important;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.15);
            background-color: #0f0f0f;
        }
        
        .faq-item .faq-line { opacity: 0; height: 0; transition: all 0.3s ease; }
        .faq-item.active .faq-line { opacity: 1; height: 100%; }
        
        .faq-item .faq-title { transition: color 0.3s ease; }
        .faq-item.active .faq-title { color: #f87171; }
        
        .faq-item .faq-icon { transition: all 0.3s ease; }
        .faq-item.active .faq-icon {
            transform: rotate(180deg);
            background-color: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }
        
        .faq-item .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .faq-item.active .faq-content { max-height: 500px; }
    </style>

    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-purple-600/10 rounded-full blur-[120px] animate-pulse-glow"></div>
        <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-red-600/5 rounded-full blur-[150px] animate-pulse-glow-slow"></div>
    </div>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        
        <div class="text-center mb-16">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-purple-500/10 text-purple-400 mb-6 border border-purple-500/20 shadow-[0_0_15px_rgba(168,85,247,0.1)]">
                <i class="fas fa-question-circle text-sm"></i>
                <span class="font-bold text-xs uppercase tracking-widest">Help & Support</span>
            </div>
            <h2 class="text-4xl md:text-5xl font-black mb-5 tracking-tighter text-white drop-shadow-md">
                Frequently Asked <span class="text-brand">Questions</span>
            </h2>
            <p class="text-gray-400 text-lg leading-relaxed">အမေးများသော မေးခွန်းများနှင့် အဖြေများ</p>
        </div>

        <div class="space-y-4" x-data="{ activeFaq: null }">
            
            <template x-for="(item, index) in faq" :key="index">
                
                <div class="faq-item glass-card rounded-2xl overflow-hidden border border-white/5 relative cursor-pointer group hover:border-white/20"
                     :class="{ 'active': activeFaq === index }"
                     @click="activeFaq = activeFaq === index ? null : index">
                    
                    <div class="faq-line absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-red-500 to-purple-500 z-10"></div>
                    
                    <div class="w-full text-left px-6 md:px-8 py-5 flex items-center justify-between relative z-10">
                        <span class="faq-title font-bold text-lg md:text-xl text-white pr-4 group-hover:text-gray-200" x-text="item.q"></span>
                        
                        <div class="faq-icon w-10 h-10 rounded-full flex items-center justify-center bg-white/5 border border-white/10 text-gray-400 flex-shrink-0">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    
                    <div class="faq-content relative z-10">
                        <div class="px-6 md:px-8 pb-6 text-gray-400 text-base md:text-lg leading-relaxed whitespace-pre-line" x-text="item.a"></div>
                    </div>
                </div>

            </template>

        </div>

        <div class="mt-12 text-center">
            <p class="text-gray-500 mb-5">အခြားသိလိုသည်များ ရှိသေးပါသလား?</p>
            <a :href="telegramUrl" target="_blank" class="inline-flex items-center gap-3 px-8 py-4 rounded-full bg-gradient-to-r from-gray-900 to-gray-800 border border-gray-700 hover:border-[#229ED9] hover:from-[#229ED9]/20 hover:to-[#229ED9]/5 transition-all duration-300 text-gray-300 hover:text-white font-bold shadow-lg hover:shadow-[0_0_25px_rgba(34,158,217,0.3)] hover:-translate-y-1 group">
                <div class="w-10 h-10 rounded-full bg-[#229ED9] flex items-center justify-center text-white group-hover:scale-110 transition-transform">
                    <i class="fab fa-telegram-plane text-lg"></i>
                </div>
                Customer Support သို့ ဆက်သွယ်ရန်
            </a>
        </div>

    </div>
</section>
