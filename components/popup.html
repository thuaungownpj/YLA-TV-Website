<div x-show="showPopup" style="display: none;" class="fixed inset-0 z-[100] bg-black/70 backdrop-blur-xl flex items-center justify-center p-4">

    <div class="relative w-full max-w-md"
         x-transition:enter="ease-out duration-500"
         x-transition:enter-start="opacity-0 scale-90 translate-y-8"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="ease-in duration-300"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4">

        <div class="relative bg-[#020202]/90 border border-white/10 p-8 md:p-10 rounded-3xl w-full text-center shadow-[0_35px_60px_-15px_rgba(0,0,0,0.9)] overflow-hidden">
            
            <div class="w-16 h-16 bg-[#1a0101] border border-red-950 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner relative">
                <div class="absolute inset-0 bg-red-600/10 rounded-full blur animate-pulse"></div>
                <i class="fas fa-bullhorn text-3xl text-red-600 animate-wiggle"></i>
            </div>

            <h3 class="text-3xl font-extrabold mb-4 text-white tracking-tight drop-shadow-sm">အသိပေးကြေညာချက်</h3>
            <p class="text-neutral-300 leading-relaxed mb-10 text-base font-medium" x-html="popupNotice"></p>

            <button @click="showPopup = false" 
                    class="w-full bg-[#e50914] text-white font-bold py-4 px-10 rounded-xl
                           transition-colors duration-150 ease-in-out
                           shadow-md hover:bg-red-700
                           active:bg-red-800
                           flex items-center justify-center gap-3 outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-[#020202]">
                <span class="text-lg">နားလည်ပါပြီ</span>
                <i class="fas fa-check-circle text-white opacity-90"></i>
            </button>

        </div>
    </div>

    <style>
        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }
        .animate-wiggle {
            animation: wiggle 0.5s ease-in-out infinite;
            display: inline-block; /* Essential for transform animations on icons */
        }
    </style>
</div>
