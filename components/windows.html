<section id="windows" class="py-24 border-t border-white/5 relative overflow-hidden bg-[#030712]">
    
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-1/4 left-0 w-[500px] h-[500px] bg-cyan-600/10 rounded-full blur-[150px] animate-pulse-glow-slow"></div>
        <div class="absolute bottom-1/4 right-0 w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[150px] animate-pulse-glow"></div>
        <div class="absolute inset-0 opacity-10" style="background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC44KSIvPjwvc3ZnPg=='); background-repeat: repeat;"></div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-10 items-center">
            
            <div class="w-full flex justify-center items-center zoom-reveal" x-intersect="$el.classList.add('active')">
                <div class="relative w-full max-w-[500px] md:max-w-[600px] animate-float-pc mx-auto">
                    <div class="absolute inset-x-12 top-10 bottom-20 bg-cyan-500/20 blur-[60px] rounded-full"></div>
                    <img :src="content.windows.imgUrl" class="relative z-10 w-full drop-shadow-[0_20px_50px_rgba(6,182,212,0.3)] hover:scale-105 transition-transform duration-700" alt="Windows App" onerror="this.src='https://via.placeholder.com/600x400/0a0a0a/00bcd4?text=Windows+Software'">
                </div>
            </div>
            
            <div class="reveal delay-100" x-intersect="$el.classList.add('active')">
                
                <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-cyan-500/10 text-cyan-400 mb-6 border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.1)]">
                    <i class="fab fa-windows text-sm"></i>
                    <span class="font-bold text-xs uppercase tracking-widest">Desktop Experience</span>
                </div>
                
                <template x-if="platforms.windows.isAvailable">
                    <div>
                        <h2 class="text-4xl md:text-5xl font-black mb-5 tracking-tighter text-white drop-shadow-md" x-text="content.windows.title"></h2>
                        <p class="text-gray-400 text-lg mb-10 leading-relaxed max-w-xl" x-html="content.windows.desc"></p>
                        
                        <div class="space-y-4">
                            <template x-for="(link, index) in content.windows.links" :key="index">
                                
                                <a :href="link.url" class="windows-glass-btn relative group flex items-center justify-between p-5 rounded-2xl overflow-hidden transition-all duration-300">
                                    
                                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:animate-shimmer z-0"></div>
                                    
                                    <div class="flex items-center gap-5 relative z-10">
                                        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-cyan-900/50 to-blue-900/50 border border-cyan-500/30 flex items-center justify-center text-2xl text-cyan-400 shadow-inner group-hover:bg-cyan-500 group-hover:text-white group-hover:border-cyan-400 transition-all duration-300 group-hover:scale-110">
                                            <i class="fab fa-windows"></i>
                                        </div>
                                        
                                        <div>
                                            <h3 class="text-xl font-bold text-white group-hover:text-cyan-400 transition-colors" x-text="link.name"></h3>
                                            <div class="text-xs text-gray-500 font-medium mt-1" x-text="link.note"></div>
                                        </div>
                                    </div>
                                    
                                    <div class="w-12 h-12 rounded-full bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center relative z-10 group-hover:bg-cyan-500 transition-colors duration-300 shadow-[0_0_10px_rgba(6,182,212,0.1)] group-hover:shadow-[0_0_20px_rgba(6,182,212,0.6)]">
                                        <i class="fas fa-download text-cyan-500 group-hover:text-white transition-transform group-hover:translate-y-1"></i>
                                    </div>
                                </a>

                            </template>
                        </div>
                    </div>
                </template>
                
                <template x-if="!platforms.windows.isAvailable">
                    <div class="glass-card p-10 rounded-3xl border border-white/10 text-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-cyan-500/5 blur-xl"></div>
                        <i class="fas fa-lock text-6xl text-gray-700 mb-5 relative z-10"></i>
                        <h2 class="text-3xl font-black mb-3 text-white relative z-10" x-text="content.windows.comingSoonTitle"></h2>
                        <p class="text-cyan-500 font-bold uppercase tracking-widest mb-5 relative z-10">Under Development</p>
                        <p class="text-gray-400 mb-10 leading-relaxed relative z-10" x-text="content.windows.comingSoonDesc"></p>
                    </div>
                </template>
            </div>

        </div>
    </div>
</section>

<style>
    /* Premium Glass Button for Windows */
    .windows-glass-btn {
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(6, 182, 212, 0.1);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .windows-glass-btn:hover {
        background: rgba(15, 23, 42, 0.8);
        border-color: rgba(6, 182, 212, 0.4);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px -5px rgba(6, 182, 212, 0.2);
    }

    /* Floating PC Animation */
    @keyframes float-pc {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-12px) rotate(0.5deg); }
    }
    .animate-float-pc { 
        animation: float-pc 7s ease-in-out infinite; 
    }

    /* Shimmer Sweep Animation */
    @keyframes shimmer {
        100% { transform: translateX(100%); }
    }
</style>
