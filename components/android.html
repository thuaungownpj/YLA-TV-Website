<section id="android" class="py-24 relative overflow-hidden bg-slate-950/40">
    
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-red-600/10 rounded-full filter blur-[120px] -z-10"></div>
    <div class="absolute top-1/4 left-1/4 w-[300px] h-[300px] bg-red-600/5 rounded-full filter blur-[100px] -z-10 animate-pulse-glow-slow"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-10 items-center">
            
            <div x-data="{ currentSlide: 0, totalSlides: 3, slideInterval: null }" 
                 x-init="slideInterval = setInterval(() => { currentSlide = (currentSlide + 1) % totalSlides }, 5000)"
                 class="w-full flex flex-col items-center justify-center zoom-reveal" x-intersect="$el.classList.add('active')">
                
                <div class="relative flex flex-col items-center w-full max-w-[220px] mx-auto">
                    
                    <div class="w-full aspect-[1/2] relative cursor-grab active:cursor-grabbing"
                         @touchstart="touchstartX = $event.changedTouches[0].screenX"
                         @touchend="touchendX = $event.changedTouches[0].screenX; 
                                    if (touchstartX - touchendX > 50) currentSlide = (currentSlide + 1) % totalSlides; 
                                    if (touchendX - touchstartX > 50) currentSlide = (currentSlide - 1 + totalSlides) % totalSlides; 
                                    clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlide = (currentSlide + 1) % totalSlides }, 5000);"
                         x-data="{ touchstartX: 0, touchendX: 0 }">
                        
                        <div class="absolute inset-4 bg-red-500/30 blur-2xl rounded-full -z-10 animate-pulse-glow"></div>
                        
                        <img loading="lazy" src="assets/ss1.png" class="absolute inset-0 w-full h-full object-contain transition-opacity duration-1000 ease-in-out drop-shadow-2xl" :class="currentSlide === 0 ? 'opacity-100 z-10' : 'opacity-0 z-0'" onerror="this.src='https://via.placeholder.com/350x700/transparent/111?text=Frame+Image+1'">
                        <img loading="lazy" src="assets/ss2.png" class="absolute inset-0 w-full h-full object-contain transition-opacity duration-1000 ease-in-out drop-shadow-2xl" :class="currentSlide === 1 ? 'opacity-100 z-10' : 'opacity-0 z-0'" onerror="this.src='https://via.placeholder.com/350x700/transparent/111?text=Frame+Image+2'">
                        <img loading="lazy" src="assets/ss3.png" class="absolute inset-0 w-full h-full object-contain transition-opacity duration-1000 ease-in-out drop-shadow-2xl" :class="currentSlide === 2 ? 'opacity-100 z-10' : 'opacity-0 z-0'" onerror="this.src='https://via.placeholder.com/350x700/transparent/111?text=Frame+Image+3'">
                    </div>

                    <div class="flex flex-row justify-center gap-3 mt-8 z-30">
                        <button @click="currentSlide = 0; clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlide = (currentSlide + 1) % totalSlides }, 5000);" class="h-3 rounded-full transition-all duration-300" :class="currentSlide === 0 ? 'bg-red-500 w-8' : 'bg-gray-600 w-3'"></button>
                        <button @click="currentSlide = 1; clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlide = (currentSlide + 1) % totalSlides }, 5000);" class="h-3 rounded-full transition-all duration-300" :class="currentSlide === 1 ? 'bg-red-500 w-8' : 'bg-gray-600 w-3'"></button>
                        <button @click="currentSlide = 2; clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlide = (currentSlide + 1) % totalSlides }, 5000);" class="h-3 rounded-full transition-all duration-300" :class="currentSlide === 2 ? 'bg-red-500 w-8' : 'bg-gray-600 w-3'"></button>
                    </div>
                </div>
            </div>

            <div class="reveal delay-100" x-intersect="$el.classList.add('active')">
                <template x-if="platforms.android.isAvailable">
                    <div>
                        <div class="flex items-center gap-3 mb-6">
                            <span class="p-3 rounded-2xl bg-red-500/20 text-red-500"><i class="fab fa-android text-3xl"></i></span>
                            <h2 class="text-3xl md:text-4xl font-bold" x-text="content.android.title"></h2>
                        </div>
                        <p class="text-lg text-gray-300 mb-10 leading-relaxed" x-text="content.android.desc"></p>

                        <div class="space-y-5">
                            <a :href="content.android.links[0]?.url || '#'" class="glass-card btn-shine hover:border-red-500/50 hover:bg-red-600/10 group p-5 rounded-2xl flex items-center justify-between transition-all duration-300">
                                <div class="flex items-center gap-5">
                                    <div class="bg-gradient-to-br from-red-600 to-red-500 p-3 rounded-xl shadow-lg">
                                        <i class="fas fa-download text-xl text-white"></i>
                                    </div>
                                    <div>
                                        <h3 class="text-xl font-bold text-white group-hover:text-red-400 transition" x-text="content.android.links[0]?.name || 'Download Link 1'"></h3>
                                        <span class="text-sm text-gray-400">Version 2.1</span>
                                    </div>
                                </div>
                                <span class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-800/50 group-hover:bg-red-500 group-hover:text-white transition-all"><i class="fas fa-arrow-down"></i></span>
                            </a>
                            <a :href="content.android.links[1]?.url || '#'" class="glass-card btn-shine hover:border-purple-500/50 hover:bg-purple-600/10 group p-5 rounded-2xl flex items-center justify-between transition-all duration-300">
                                <div class="flex items-center gap-5">
                                    <div class="bg-gradient-to-br from-purple-600 to-purple-500 p-3 rounded-xl shadow-lg">
                                        <i class="fas fa-download text-xl text-white"></i>
                                    </div>
                                    <div>
                                        <h3 class="text-xl font-bold text-white group-hover:text-purple-400 transition" x-text="content.android.links[1]?.name || 'Download Link 2'"></h3>
                                        <span class="text-sm text-gray-400">Version 2.1</span>
                                    </div>
                                </div>
                                <span class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-800/50 group-hover:bg-purple-500 group-hover:text-white transition-all"><i class="fas fa-arrow-down"></i></span>
                            </a>
                            <a :href="content.android.links[2]?.url || '#'" class="glass-card btn-shine hover:border-green-500/50 hover:bg-green-600/10 group p-5 rounded-2xl flex items-center justify-between transition-all duration-300">
                                <div class="flex items-center gap-5">
                                    <div class="bg-gradient-to-br from-green-600 to-green-500 p-3 rounded-xl shadow-lg">
                                        <i class="fas fa-download text-xl text-white"></i>
                                    </div>
                                    <div>
                                        <h3 class="text-xl font-bold text-white group-hover:text-green-400 transition" x-text="content.android.links[2]?.name || 'Download Link 3'"></h3>
                                        <span class="text-sm text-gray-400">Version 2.1</span>
                                    </div>
                                </div>
                                <span class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-800/50 group-hover:bg-green-500 group-hover:text-white transition-all"><i class="fas fa-arrow-down"></i></span>
                            </a>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</section>

<style>
    .btn-shine { position: relative; overflow: hidden; }
    .btn-shine::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent); transform: skewX(-15deg); }
    .btn-shine:hover::after { animation: shine 0.75s ease-in-out; }
    @keyframes shine { 100% { left: 125%; } }
    .animate-pulse-glow { animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .animate-pulse-glow-slow { animation: pulse-glow-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse-glow-slow { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
</style>
